<body>
<div id="root"></div>
<script>
(function(){
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useMemo=React.useMemo;
var h=React.createElement;

var MODEL_URL = './assets/yolov8n.onnx';
var INPUT_SIZE = 640;
var CONF_THRESHOLD = 0.25;
var IOU_THRESHOLD = 0.45;
var NUM_CLASSES = 80;

// 0-based MS COCO class IDs for vehicle-related classes (only keep the global argmax if it's one of these)
var VEH_LABELS = {0:'Person', 1:'Bicycle', 2:'Car', 3:'Motorcycle', 5:'Bus', 7:'Truck'};
var VK_SET = {0:true, 1:true, 2:true, 3:true, 5:true, 7:true};
var VC = {0:'#a78bfa', 1:'#06b6d4', 2:'#22c55e', 3:'#eab308', 5:'#f97316', 7:'#ef4444'};

var _session = null, _loading = null;

function loadMdl() {
  if (_session) return Promise.resolve(_session);
  if (_loading) return _loading;

  _loading = ort.InferenceSession.create(MODEL_URL, {
    executionProviders: ['wasm']
  }).then(function(sess) {
    _session = sess;
    _loading = null;
    console.log('YOLOv8n ONNX loaded. Inputs:', sess.inputNames, 'Outputs:', sess.outputNames);
    return sess;
  }).catch(function(err) {
    _loading = null;
    console.error('Failed to load YOLOv8n:', err);
    throw new Error('Model load failed: ' + err.message);
  });

  return _loading;
}

// Letterbox image to square 640x640 with gray (114,114,114) padding, normalize to [0,1] CHW
function preprocess(img) {
  var origW = img.naturalWidth || img.width;
  var origH = img.naturalHeight || img.height;

  var scale = Math.min(INPUT_SIZE / origW, INPUT_SIZE / origH);
  var newW = Math.round(origW * scale);
  var newH = Math.round(origH * scale);
  var padX = Math.floor((INPUT_SIZE - newW) / 2);
  var padY = Math.floor((INPUT_SIZE - newH) / 2);

  var canvas = document.createElement('canvas');
  canvas.width = INPUT_SIZE;
  canvas.height = INPUT_SIZE;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#727272';
  ctx.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
  ctx.drawImage(img, padX, padY, newW, newH);

  var imageData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
  var data = imageData.data;

  var tensor = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);
  var plane = INPUT_SIZE * INPUT_SIZE;
  for (var y = 0; y < INPUT_SIZE; y++) {
    for (var x = 0; x < INPUT_SIZE; x++) {
      var idx = (y * INPUT_SIZE + x) * 4;
      var dst = y * INPUT_SIZE + x;
      tensor[dst] = data[idx] / 255.0;
      tensor[plane + dst] = data[idx + 1] / 255.0;
      tensor[2 * plane + dst] = data[idx + 2] / 255.0;
    }
  }

  return {
    tensor: new ort.Tensor('float32', tensor, [1, 3, INPUT_SIZE, INPUT_SIZE]),
    scale: scale,
    padX: padX,
    padY: padY,
    origW: origW,
    origH: origH
  };
}

function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

// Classic greedy NMS per-class, IoU threshold
function nms(boxes, iouThresh) {
  // Group by class
  var byClass = {};
  boxes.forEach(function(b, i) {
    if (!byClass[b.cls]) byClass[b.cls] = [];
    byClass[b.cls].push(b);
  });
  var kept = [];
  Object.keys(byClass).forEach(function(cls) {
    var arr = byClass[cls].slice().sort(function(a,b){return b.conf-a.conf;});
    var out = [];
    while (arr.length) {
      var best = arr.shift();
      out.push(best);
      arr = arr.filter(function(other) {
        // compute IoU
        var x1 = Math.max(best.x, other.x);
        var y1 = Math.max(best.y, other.y);
        var x2 = Math.min(best.x + best.w, other.x + other.w);
        var y2 = Math.min(best.y + best.h, other.y + other.h);
        var iw = Math.max(0, x2 - x1), ih = Math.max(0, y2 - y1);
        var inter = iw * ih;
        var uni = best.w * best.h + other.w * other.h - inter;
        var iou = uni > 0 ? inter / uni : 0;
        return iou < iouThresh;
      });
    }
    out.forEach(function(b){kept.push(b);});
  });
  return kept;
}

function doDetect(img) {
  var prep = preprocess(img);
  var feeds = {};
  feeds[_session.inputNames[0]] = prep.tensor;

  return _session.run(feeds).then(function(outputs) {
    var out = outputs[_session.outputNames[0]];
    var data = out.data;   // Float32Array, length 84 * 8400
    var numBoxes = out.dims[2]; // 8400

    // Output layout: data[row * numBoxes + col], rows 0..3 = cx,cy,w,h, rows 4..83 = 80 class scores (already sigmoid'd)
    var candidates = [];
    for (var i = 0; i < numBoxes; i++) {
      // Find GLOBAL argmax across all 80 classes (scores already in [0,1])
      var bestC = 0, bestLogit = -Infinity;
      for (var c = 0; c < NUM_CLASSES; c++) {
        var logit = data[(4 + c) * numBoxes + i];
        if (logit > bestLogit) { bestLogit = logit; bestC = c; }
      }
      // Only keep if the model's top prediction is a vehicle class
      if (!VK_SET[bestC]) continue;

      // Values are already sigmoid'd (probabilities in [0,1]), not raw logits
      var score = bestLogit;
      if (score < CONF_THRESHOLD) continue;

      var cx = data[0 * numBoxes + i];
      var cy = data[1 * numBoxes + i];
      var w  = data[2 * numBoxes + i];
      var h  = data[3 * numBoxes + i];

      // Letterbox-corrected original image coords
      var x0 = (cx - w / 2 - prep.padX) / prep.scale;
      var y0 = (cy - h / 2 - prep.padY) / prep.scale;
      var bw = w / prep.scale;
      var bh = h / prep.scale;

      // Clamp inside original image
      if (x0 < 0) { bw += x0; x0 = 0; }
      if (y0 < 0) { bh += y0; y0 = 0; }
      if (x0 + bw > prep.origW) bw = prep.origW - x0;
      if (y0 + bh > prep.origH) bh = prep.origH - y0;
      if (bw <= 1 || bh <= 1) continue;

      candidates.push({
        x: x0, y: y0, w: bw, h: bh,
        conf: score, cls: bestC
      });
    }

    var detections = nms(candidates, IOU_THRESHOLD);

    var counts = {};
    detections.forEach(function(d) {
      var label = VEH_LABELS[d.cls];
      counts[label] = (counts[label] || 0) + 1;
    });

    return {
      dets: detections.map(function(d) {
        return {
          x: d.x,
          y: d.y,
          w: d.w,
          h: d.h,
          label: VEH_LABELS[d.cls],
          conf: d.conf,
          cls: d.cls
        };
      }),
      counts: counts,
      total: detections.length
    };
  });
}

function drawBx(ctx,dets,cw,ch,ow,oh){
  var sx=cw/ow,sy=ch/oh;
  dets.forEach(function(d){
    var x=d.x*sx,y=d.y*sy,w=d.w*sx,ht=d.h*sy;
    var col=VC[d.cls]||'#22c55e';
    ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,Math.round(cw/300));
    ctx.strokeRect(x,y,w,ht);
    var fs=Math.max(10,Math.round(cw/50));
    ctx.font='bold '+fs+'px Arial';
    var t=d.label+' '+Math.round(d.conf*100)+'%';
    var tw=ctx.measureText(t).width,bh=fs+5;
    ctx.fillStyle=col;ctx.fillRect(x,Math.max(0,y-bh),tw+6,bh);
    ctx.fillStyle='#fff';ctx.textBaseline='middle';

}

var PX=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];

// Fast path: load image directly via <img> tag with crossOrigin (single GET, no blob)
function tryImgDirect(src, timeoutMs){
  return new Promise(function(ok, no){
    var img = new Image();
    img.crossOrigin = 'anonymous';
    var done = false;
    var timer = setTimeout(function(){
      if(!done){ done=true; img.src=''; no(new Error('timeout')); }
    }, timeoutMs);
    img.onload = function(){
      if(done) return;
      done = true;
      clearTimeout(timer);
      ok(img);
    };
    img.onerror = function(){
      if(done) return;
      done = true;
      clearTimeout(timer);
      no(new Error('img error'));
    };
    img.src = src;
  });
}

// Slow path: fetch bytes via CORS proxy -> blob -> img (for cases where proxy doesn't pass CORS)
function tryImgViaFetch(src, timeoutMs){
  return new Promise(function(ok, no){
    var done = false;
    var timer = setTimeout(function(){
      if(!done){ done=true; no(new Error('timeout')); }
    }, timeoutMs);
    var ctrl = new AbortController();
    fetch(src, {mode:'cors', cache:'force-cache', signal:ctrl.signal})
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.arrayBuffer();
      })
      .then(function(buf){
        if(done) return;
        done = true;
        clearTimeout(timer);
        try{ ctrl.abort(); }catch(e){}
        var blob = new Blob([buf], {type:'image/jpeg'});
        var url = URL.createObjectURL(blob);
        var img = new Image();
        img.onload = function(){ ok(img); };
        img.onerror = function(){ no(new Error('blob-img error')); };
        img.src = url;
      })
      .catch(function(e){
        if(done) return;
        done = true;
        clearTimeout(timer);
        no(e);
      });
  });
}

function getImg(url){
  var start = Date.now();
  console.log('[getImg] racing all sources for:', url);

  // Race ALL sources simultaneously with timeouts
  var attempts = [
    tryImgDirect(url, 3000).then(function(img){
      console.log('[getImg] DIRECT OK in '+(Date.now()-start)+'ms');
      return img;
    }).catch(function(e){ console.warn('[getImg] direct failed:', e.message); return null; }),

    tryImgDirect(PX[0]+encodeURIComponent(url), 6000).then(function(img){
      console.log('[getImg] PROXY0 (direct) OK in '+(Date.now()-start)+'ms');
      return img;
    }).catch(function(e){ console.warn('[getImg] proxy0 direct failed:', e.message); return null; }),

    tryImgDirect(PX[1]+encodeURIComponent(url), 8000).then(function(img){
      console.log('[getImg] PROXY1 (direct) OK in '+(Date.now()-start)+'ms');
      return img;
    }).catch(function(e){ console.warn('[getImg] proxy1 direct failed:', e.message); return null; }),

    tryImgViaFetch(PX[0]+encodeURIComponent(url), 8000).then(function(img){
      console.log('[getImg] PROXY0 (fetch) OK in '+(Date.now()-start)+'ms');
      return img;
    }).catch(function(e){ console.warn('[getImg] proxy0 fetch failed:', e.message); return null; }),

    tryImgViaFetch(PX[1]+encodeURIComponent(url), 10000).then(function(img){
      console.log('[getImg] PROXY1 (fetch) OK in '+(Date.now()-start)+'ms');
      return img;
    }).catch(function(e){ console.warn('[getImg] proxy1 fetch failed:', e.message); return null; })
  ];

  // First non-null wins
  function raceFirst(list){
    return Promise.all(list.map(function(p){
      return p.catch(function(){ return null; });
    })).then(function(results){
      for(var i=0;i<results.length;i++){
        if(results[i]) return results[i];
      }
      throw new Error('all sources failed');
    });
  }

  // But also support fast-first: if any single one resolves early, take it
  return new Promise(function(ok, no){
    var resolved = false;
    attempts.forEach(function(p){
      p.then(function(img){
        if(img && !resolved){
          resolved = true;
          console.log('[getImg] FIRST WINNER in '+(Date.now()-start)+'ms');
          ok(img);
        }
      });
    });
    // Also wait for all to settle
    Promise.all(attempts).then(function(results){
      if(resolved) return;
      for(var i=0;i<results.length;i++){
        if(results[i]){
          resolved = true;
          console.log('[getImg] SETTLED WINNER in '+(Date.now()-start)+'ms');
          ok(results[i]);
          return;
        }
      }
      no(new Error('all sources failed'));
    });
  });
}

function ldImg(url){

  return Promise.resolve(url);
}
